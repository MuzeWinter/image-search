<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZOOBET检索</title>
  </head>
  <body>
    
    <div id="root">
      <div id="__html_fallback" style="
        display:flex;align-items:center;justify-content:center;
        height:100vh;background:#1a1a2e;color:#e0e0e0;
        font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      ">
        <div style="text-align:center;max-width:480px">
          <div style="font-size:64px;margin-bottom:16px">🔍</div>
          <h1 style="font-size:24px;font-weight:600;margin:0 0 8px">ZOOBET Search</h1>
          <p style="font-size:14px;color:#888;margin:0 0 24px">正在加载...</p>
          <div style="width:200px;height:3px;background:#333;margin:0 auto;border-radius:2px;overflow:hidden">
            <div id="__fallback_bar" style="width:0%;height:100%;background:#4a9eff;transition:width 0.3s"></div>
          </div>
          <p id="__fallback_msg" style="font-size:12px;color:#555;margin-top:16px"></p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  
    <script>
      (function() {
        var bar = document.getElementById('__fallback_bar');
        var msg = document.getElementById('__fallback_msg');
        var w = 0;
        var timer = setInterval(function() {
          w = Math.min(w + Math.random() * 8, 90);
          if (bar) bar.style.width = w + '%';
          if (w >= 89) { clearInterval(timer); if (msg) msg.textContent = '请稍候...'; }
        }, 400);
        
        // Hide fallback when React renders
        var observer = new MutationObserver(function() {
          var root = document.getElementById('root');
          var fb = document.getElementById('__html_fallback');
          if (root && fb && root.children.length > 1) {
            fb.style.display = 'none';
            observer.disconnect();
            clearInterval(timer);
          }
        });
        observer.observe(document.getElementById('root'), { childList: true, subtree: true });
        
        // After 10s, show error if still loading
        setTimeout(function() {
          var fb = document.getElementById('__html_fallback');
          if (fb && fb.style.display !== 'none') {
            if (msg) msg.textContent = '⚠ 加载超时 - 请检查 Python 环境';
            if (bar) bar.style.background = '#e74c3c';
          }
        }, 10000);
      })();
    </script>
</body>
</html>
