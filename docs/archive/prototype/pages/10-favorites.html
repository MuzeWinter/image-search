</head>

<div class="app-shell">
  <aside class="app-sidebar">
    <div class="sidebar-brand"><span class="sidebar-brand-icon">设</span>ZOOBET检索</div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">检索</div>
      <a href="01-search.html" class="sidebar-link"><span class="sidebar-link-icon">🔍</span>首页搜索</a>
      <div class="sidebar-section">浏览</div>
      <a href="02-image-library.html" class="sidebar-link"><span class="sidebar-link-icon">🖼</span>图片库<span class="sidebar-badge">11</span></a>
      <a href="06-cad-files.html" class="sidebar-link"><span class="sidebar-link-icon">◇</span>CAD / UG 文件<span class="sidebar-badge">12</span></a>
      <a href="07-excel-records.html" class="sidebar-link"><span class="sidebar-link-icon">📊</span>Excel 记录<span class="sidebar-badge">7</span></a>
      <a href="08-pdf-files.html" class="sidebar-link"><span class="sidebar-link-icon">📄</span>PDF 文件<span class="sidebar-badge">3</span></a>
      <div class="sidebar-section">管理</div>
      <a href="03-library.html" class="sidebar-link"><span class="sidebar-link-icon">📁</span>资料库</a>
      <a href="04-scan-report.html" class="sidebar-link"><span class="sidebar-link-icon">📋</span>扫描报告</a>
      <a href="05-match-management.html" class="sidebar-link"><span class="sidebar-link-icon">🔗</span>匹配管理<span class="sidebar-badge">3</span></a>

      <div class="sidebar-section">分类</div>
      <a href="09-tags.html" class="sidebar-link"><span class="sidebar-link-icon">🏷</span>标签分类</a>

    </nav>

  <header class="app-header">
    <div class="app-header-left"><span class="app-subtitle">收藏</span></div>
    <div class="app-header-right"><span class="text-xs text-muted">共 3 项</span></div>
  </header>
  <main class="app-main">
    <div class="page-header"><h1>收藏</h1><p>快速访问已收藏的图片和记录。收藏的图片在搜索时可通过「仅收藏」范围筛选。</p></div>

    <div class="section-grid" id="favGrid"></div>
  </main>
</div>

<script src="js/app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const grid = document.getElementById('favGrid');
    grid.innerHTML = MOCK.favorites.map(f => {
      const img = MOCK.imageAssets.find(i => i.imgId === f.imgId);
      if (!img) return '';
      const cad = img.cadRef ? MOCK.cadFiles.find(c => c.cadId === img.cadRef) : null;
      const exRec = img.exRef ? MOCK.excelRecords.find(e => e.exId === img.exRef) : null;

      return `
      <div class="card">
        <div style="aspect-ratio:16/10;background:var(--surface-hover);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:var(--space-4);overflow:hidden;">
          <span style="color:var(--muted);font-size:13px;">${img.imgId}<br>${img.filename}</span>
        </div>
        <div class="flex justify-between items-center" style="margin-bottom:var(--space-2);">
          <span class="mono">${img.imgId}</span>
          <span class="badge badge-muted">${sourceTypeLabel(img.sourceType)}</span>
        </div>
        <div class="text-sm" style="margin-bottom:var(--space-1);">${img.filename}</div>
        <div class="path-display" style="margin-bottom:var(--space-2);">${img.folder}</div>
        ${f.note ? '<div class="text-xs text-muted" style="margin-bottom:var(--space-2);">备注: '+f.note+'</div>' : ''}
        ${exRec ? '<div class="text-xs" style="margin-bottom:var(--space-1);"><span class="mono">'+exRec.exId+'</span> '+exRec.name+'</div>' : ''}
        ${cad ? '<div class="text-xs" style="margin-bottom:var(--space-2);"><span class="mono">'+cad.cadId+'</span> '+cad.filename+'</div>' : ''}
        ${img.tags.length ? '<div class="flex gap-1" style="margin-bottom:var(--space-3);">'+img.tags.map(t=>'<span class="tag">'+t+'</span>').join('')+'</div>' : ''}
        <div class="flex gap-2">
          <button class="btn btn-xs" onclick="showToast('查看大图')">查看大图</button>
          <button class="btn btn-xs btn-ghost" onclick="showToast('已打开文件夹')">📂</button>
          <button class="btn btn-xs btn-ghost btn-danger" style="margin-left:auto;" onclick="showToast('已取消收藏')">取消收藏</button>
        </div>
        <div class="text-xs text-muted" style="margin-top:var(--space-2);">收藏于 ${f.addedAt}</div>
      </div>`;
    }).join('');
    initSidebar();
  });
</script>
</body>
</html>
