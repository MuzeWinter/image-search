<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>图片库 — ZOOBET检索</title>
<link rel="stylesheet" href="css/design-system.css">
</head>
<body>
<div class="app-shell">
  <aside class="app-sidebar">
    <div class="sidebar-brand"><span class="sidebar-brand-icon">设</span>ZOOBET检索</div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">检索</div>
      <a href="01-search.html" class="sidebar-link"><span class="sidebar-link-icon">🔍</span>首页搜索</a>
      <div class="sidebar-section">浏览</div>
      <a href="02-image-library.html" class="sidebar-link active"><span class="sidebar-link-icon">🖼</span>图片库<span class="sidebar-badge">11</span></a>
      <a href="06-cad-files.html" class="sidebar-link"><span class="sidebar-link-icon">◇</span>CAD / UG 文件<span class="sidebar-badge">12</span></a>
      <a href="07-excel-records.html" class="sidebar-link"><span class="sidebar-link-icon">📊</span>Excel 记录<span class="sidebar-badge">7</span></a>
      <a href="08-pdf-files.html" class="sidebar-link"><span class="sidebar-link-icon">📄</span>PDF 文件<span class="sidebar-badge">3</span></a>
      <div class="sidebar-section">管理</div>
      <a href="03-library.html" class="sidebar-link"><span class="sidebar-link-icon">📁</span>资料库</a>
      <a href="04-scan-report.html" class="sidebar-link"><span class="sidebar-link-icon">📋</span>扫描报告</a>
      <a href="05-match-management.html" class="sidebar-link"><span class="sidebar-link-icon">🔗</span>匹配管理<span class="sidebar-badge">3</span></a>
      <a href="12-changelog.html" class="sidebar-link"><span class="sidebar-link-icon">📝</span>变更记录<span class="sidebar-badge">5</span></a>
      <div class="sidebar-section">分类</div>
      <a href="09-tags.html" class="sidebar-link"><span class="sidebar-link-icon">🏷</span>标签分类</a>
      <a href="10-favorites.html" class="sidebar-link"><span class="sidebar-link-icon">★</span>收藏<span class="sidebar-badge">3</span></a>
      <div class="sidebar-section">系统</div>
      <a href="11-settings.html" class="sidebar-link"><span class="sidebar-link-icon">⚙</span>设置</a>
    </nav>
    <div class="sidebar-footer">v1.0.0 · 本地运行</div>
  </aside>
  <header class="app-header">
    <div class="app-header-left"><span class="app-subtitle">图片库</span></div>
    <div class="app-header-right">
      <span class="text-xs text-muted">共 11 张 · 已索引 10 · 待索引 1</span>
    </div>
  </header>
  <main class="app-main">
    <div class="page-header"><h1>图片库</h1><p>管理所有已扫描的图片资源，包括 Excel 内嵌图片、独立图片文件、PDF 预览图等。可查看缩略图、绑定 CAD/UG 文件、添加标签。</p></div>

    <div class="filter-bar">
      <select onchange="filterImages()" id="filterType">
        <option value="all">全部来源</option>
        <option value="excel-embedded">Excel 内嵌图片</option>
        <option value="standalone">独立图片</option>
        <option value="pdf-preview">PDF 预览图</option>
        <option value="manual">手动补图</option>
      </select>
      <select onchange="filterImages()" id="filterStatus">
        <option value="all">全部状态</option>
        <option value="normal">正常</option>
        <option value="pending">待确认</option>
        <option value="missing">缺失</option>
      </select>
      <select onchange="filterImages()" id="filterCAD">
        <option value="all">全部关联</option>
        <option value="linked">有关联 CAD/UG</option>
        <option value="unlinked">无关联 CAD/UG</option>
      </select>
      <div class="search-bar">
        <input type="text" placeholder="搜索 IMG 编号、文件名…" oninput="filterImages()" id="filterSearch">
      </div>
      <span class="toolbar-spacer"></span>
      <button class="btn btn-sm" onclick="showToast('索引重建已开始…')">重建索引</button>
    </div>

    <div class="thumb-grid" id="thumbGrid"></div>

    <div style="text-align:center;padding:var(--space-6);">
      <span class="text-xs text-muted" id="displayCount">显示 11 张</span>
    </div>
  </main>
</div>

<script src="js/app.js"></script>
<script>
  function filterImages() {
    const type = document.getElementById('filterType').value;
    const status = document.getElementById('filterStatus').value;
    const cad = document.getElementById('filterCAD').value;
    const search = document.getElementById('filterSearch').value.toLowerCase();

    let filtered = MOCK.imageAssets.filter(img => {
      if (type !== 'all' && img.sourceType !== type) return false;
      if (status !== 'all' && img.status !== status) return false;
      if (cad === 'linked' && !img.cadRef) return false;
      if (cad === 'unlinked' && img.cadRef) return false;
      if (search && !img.imgId.toLowerCase().includes(search) && !img.filename.toLowerCase().includes(search) && !img.folder.toLowerCase().includes(search)) return false;
      return true;
    });

    renderGrid(filtered);
    document.getElementById('displayCount').textContent = '显示 ' + filtered.length + ' 张';
  }

  function renderGrid(images) {
    const grid = document.getElementById('thumbGrid');
    grid.innerHTML = images.map(img => {
      const cad = img.cadRef ? MOCK.cadFiles.find(c => c.cadId === img.cadRef) : null;
      return `
      <div class="thumb-card" onclick="showToast('查看大图: ${img.imgId}')">
        <div class="thumb-img">
          <span style="color:var(--muted);font-size:11px;">${img.imgId}<br>${img.filename}</span>
        </div>
        <div class="thumb-info">
          <div class="thumb-id">${img.imgId}</div>
          <div class="thumb-name">${img.filename}</div>
          <div class="flex gap-1 items-center" style="margin-top:2px;">
            <span class="badge ${img.sourceType==='excel-embedded'?'badge-info':img.sourceType==='standalone'?'badge-success':'badge-muted'}">${sourceTypeLabel(img.sourceType)}</span>
            ${img.cadRef ? '<span class="badge badge-success">CAD</span>' : ''}
            ${img.indexed ? '' : '<span class="badge badge-warning">未索引</span>'}
          </div>
          ${cad ? '<div class="text-xs text-muted truncate" style="margin-top:2px;">'+fileTypeIcon(cad.fileType)+' '+cad.filename+'</div>' : ''}
          ${img.tags.length ? '<div class="flex gap-1" style="margin-top:3px;">'+img.tags.slice(0,2).map(t=>'<span class="tag">'+t+'</span>').join('')+'</div>' : ''}
          <div class="thumb-info" style="padding:0;margin-top:4px;display:flex;gap:4px;">
            <button class="btn btn-xs" onclick="event.stopPropagation();showToast('已打开文件夹: ${img.folder}')">📂</button>
            <button class="btn btn-xs" onclick="event.stopPropagation();showToast('已复制路径')">📋</button>
            <button class="btn btn-xs" onclick="event.stopPropagation();showToast('已加入收藏')">★</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderGrid(MOCK.imageAssets);
    initSidebar();
  });
</script>
</body>
</html>
